# CP5 Navigation Policy — skrl PPO configuration
#
# Architecture: custom CNN+MLP (NavigationPolicy + NavigationValue)
# Defined in: navigation/models/navigation_policy.py
#
# The models block is intentionally left as a placeholder comment because
# CP5 uses CUSTOM model classes (not skrl's model instantiator).
# Models are passed directly to the skrl Runner in scripts/cp5/train.py.
#
# See: scripts/cp5/train.py for how to wire models to the agent.

seed: 42


# PPO agent configuration
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  # RunningStandardScaler is CRITICAL — prevents NaN in gradients
  # when obs contains mix of binary grid (0/1) and float scalars
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.01
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True
  experiment:
    directory: "neurogait_cp5_navigation"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 200   # save every 200 iterations


# Rollout memory
memory:
  class: RandomMemory
  memory_size: -1  # same as rollouts


# Sequential trainer
# timesteps = iterations × rollouts = 2000 × 24 = 48000
trainer:
  class: SequentialTrainer
  timesteps: 48000
  environment_info: log
