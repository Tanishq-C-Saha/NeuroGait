# CP5 Navigation Policy — skrl PPO configuration
# Trained on: NeuroGait-Navigation-CP5-v0
# Observation space: ~1612-dim (base_lin_vel + projected_gravity + goal_vector + robot_velocity + occupancy_grid)
# Action space: 3-dim (vx, vy, yaw_rate → PreTrainedPolicyAction → loco policy → joints)

seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: False
  policy:  # GaussianMixin: stochastic policy for PPO
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:  # DeterministicMixin: value function
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 24                    # steps per env per update
  learning_epochs: 5              # PPO epochs per rollout batch
  mini_batches: 4                 # number of mini-batches per epoch
  discount_factor: 0.99           # gamma
  lambda: 0.95                    # GAE lambda
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  # CRITICAL: RunningStandardScaler MUST be active.
  # Without it the obs (~1612-dim with 1600 binary grid values) will be
  # on a very different scale from the rewards, causing training failure
  # (robot splays and never learns). Do NOT set these to null.
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.01        # encourage exploration early in training
  value_loss_scale: 0.5
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True      # bootstrap value at episode timeout
  # logging and checkpoint
  experiment:
    directory: "neurogait_navigation_cp5"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  # 1024 envs × 24 rollouts × 2000 updates = ~49M timesteps
  timesteps: 49152000
  environment_info: log
